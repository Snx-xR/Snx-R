env:
    CIRRUS_CLONE_DEPTH: 1
    BUILD_HOSTNAME: "cirrus-ci.org"
    rom_name: Nusantara
    device: lavender

task:
  name: "Snx-R"
  # skip: $CIRRUS_BRANCH == 'main'
  timeout_in: 240m
  container:
      image: snaxpsycho/cirrus:latest
      cpu: 8
      memory: 32G
      stateful: true
      greedy: true
      volumes:
          - /home/cirrus:/home/cirrus
          - /home/cirrus/ccache:/home/cirrus/ccache
          - /home/cirrus/.config:/home/cirrus/.config
          
  # notify_script:
    # - bash <(curl -s $script/notify.sh)
    
  # sync_script:
    # - bash <(curl -s $script/sync.sh)
    
  download_file_script:
    - mkdir ~/$rom_name
    - mkdir ~/$rom_name/out
    - mkdir ~/$rom_name/out/target
    - mkdir ~/$rom_name/out/target/product
    - mkdir ~/$rom_name/out/target/product/$device
    - cd ~/$rom_name/out/target/product/$device
    - wget https://master.dl.sourceforge.net/project/snx-r/lavender/Nusantara-EOL-lavender-VANILLA-16112023-snx-0920.zip?viasf=1
    - cp Nusantara-EOL-lavender-VANILLA-16112023-snx-0920.zip Nusantara-EOL-lavender-VANILLA-16112023-ota-0920.zip
  
  vanilla_build_script:
    - bash <(curl -s $script/build.sh)
    
  # apps_up_script:
    # - set -e
    # - bash <(curl -s $script/upload_apps.sh)
    
  # gapps_build_script:
    # - set -e
    # - bash <(curl -s $script/gapps_build.sh)
    
  # gapps_up_script:
    # - set -e
    # - bash <(curl -s $script/sfg_uploader.sh)
